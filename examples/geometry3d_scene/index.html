<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometry 3D Scene - Scala WebGPU</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c12;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #container {
      width: 90vw;
      height: 90vh;
    }

    canvas {
      border: 2px solid #2a2a4a;
      border-radius: 4px;
      width: 100%;
      height: 100%;
    }

    .back-link {
      position: fixed;
      top: 1rem;
      left: 1rem;
      color: #8888aa;
      text-decoration: none;
    }

    .back-link:hover {
      color: #aaaacc;
    }
  </style>
</head>

<body>
  <a href="/" class="back-link">&larr; Back to examples</a>
  <div id="container">
    <canvas id="canvas"></canvas>
  </div>
  <script type="module" src="main.js"></script>
</body>

</html>
