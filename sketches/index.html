<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scala WebGPU Sketches</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }
    h1 {
      color: #eeeeff;
      margin-bottom: 2rem;
      text-align: center;
    }
    .sketches {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .sketch-link {
      display: block;
      padding: 1.5rem;
      background: #2a2a4e;
      border: 2px solid #4a4a6a;
      border-radius: 8px;
      color: #aaaacc;
      text-decoration: none;
      transition: all 0.2s;
    }
    .sketch-link:hover {
      background: #3a3a5e;
      border-color: #6a6a8a;
      color: #ccccee;
    }
    .sketch-link h2 {
      color: #eeeeff;
      margin-bottom: 0.5rem;
      font-size: 1.25rem;
    }
    .sketch-link p { font-size: 0.875rem; }
  </style>
</head>

<body>
  <h1>Scala WebGPU Sketches</h1>
  <div class="sketches">
    <a href="/base-triangle/" class="sketch-link">
      <h2>Base Triangle</h2>
      <p>Rotating triangle around Y with a perspective camera. Minimal painter setup with a Mat4 mvp uniform driven by the animate loop.</p>
    </a>
  </div>
</body>

</html>
